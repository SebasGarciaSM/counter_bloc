workflows:
  counter-bloc-workflow:
    name: Counter BLoC CI
    instance_type: linux
    max_build_duration: 30

    environment:
      flutter: stable

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Static Analysis
        script: flutter analyze

      - name: Run BLoC Tests
        script: flutter test

      - name: Build Android APK
        script: flutter build apk --debug

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      
    publishing:
      email:
        recipients:
          - sebastiangsm3@gmail.com